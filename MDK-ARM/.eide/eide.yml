    cppPreprocessAttrs:
      defineList:
        - USE_HAL_DRIVER
        - STM32G474xx
      incList:
        - ../Core/Inc
        - ../Drivers/STM32G4xx_HAL_Driver/Inc
        - ../Drivers/STM32G4xx_HAL_Driver/Inc/Legacy
        - ../Drivers/CMSIS/Device/ST/STM32G4xx/Include
        - ../Drivers/CMSIS/Include
        - .cmsis/include
        - RTE/_IH_incomp
      libList: []
    excludeList: []
    settings:
      debugger: cortex-debug
    toolchain: AC5
    toolchainConfigMap:
      AC5:
        archExtensions: ""
        cpuType: Cortex-M4
        floatingPointHardware: single
        options:
          version: 4
          afterBuildTasks: []
          asm-compiler:
            defines: []
          beforeBuildTasks: []
