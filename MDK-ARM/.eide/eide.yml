            output-debug-info: enable
            use-microLIB: false
          linker:
            $outputTaskExcludes:
              - .bin
            output-format: elf
            ro-base: ""
            rw-base: ""
            xo-base: ""
        scatterFilePath: stm32g474xx_flash.sct
        storageLayout:
